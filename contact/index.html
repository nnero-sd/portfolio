<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <script type="module" src="../global.js"></script>
    <title>Contact</title>
</head>
<body>

    <h1>Contact me</h1>
    <p>Send me a message using the form below.</p>
    <form action="mailto:nnero@ucsd.edu" method="POST" enctype="text/plain">
        <label>
            <span>Email</span>
            <input type="email" name="email" value="student@school.edu">
        </label>
        <label>
            <span>Subject</span>
            <input name="subject" value="Portfolio inquiry">
        </label>
        <label>
            <span>Message</span>
            <textarea name="body">Hi Nate, I wanted to reach out about your portfolio site.</textarea>
        </label>
        <button>Submit</button>
    </form>
</body>
</html>
