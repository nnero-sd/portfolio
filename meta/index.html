<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <script type="module" src="../global.js"></script>
    <title>Meta</title>
</head>
<body>
    <h1>Meta</h1>
    <p>This page includes stats about the code of this website.</p>

    <div id="stats"></div>

    <dl id="commit-tooltip" class="info tooltip" hidden>
      <dt>Commit</dt>
      <dd><a href="" id="commit-link" target="_blank"></a></dd>

      <dt>Date</dt>
      <dd id="commit-date"></dd>

      <dt>Time</dt>
      <dd id="commit-time"></dd>

      <dt>Author</dt>
      <dd id="commit-author"></dd>

      <dt>Lines edited</dt>
      <dd id="commit-lines"></dd>
    </dl>

    <h2>Commits by time of day</h2>

    <div id="scrolly-1">
      <div id="scatter-story">
        <!-- commit story steps injected by JS -->
      </div>
      <div id="scatter-plot">
        <div id="chart"></div>
        <p id="selection-count">No commits selected</p>
        <dl id="files"></dl>
      </div>
    </div>

    <dl id="language-breakdown" class="stats"></dl>

    <script type="module" src="main.js"></script>
</body>
</html>
